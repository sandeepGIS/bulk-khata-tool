<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khata Relational GIS System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  margin:0;
}
header{
  background:#0b4d8c;
  color:white;
  padding:20px;
  text-align:center;
}
.container{
  padding:20px;
}
textarea{
  width:100%;
  height:250px;
  padding:10px;
}
button{
  padding:10px 15px;
  margin:10px 5px 10px 0;
  border:none;
  cursor:pointer;
  color:white;
  border-radius:5px;
}
.process{ background:#087a63; }
.export{ background:#1565c0; }
.clear{ background:#b42318; }
.count{
  margin-top:15px;
  font-weight:bold;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:white;
}

  border:1px solid #ccc;

  font-size:13px;
}

<body>

<header>
<h2>Khata Relational GIS Processing System</h2>
</header>

<div class="container">

<textarea id="inputText" placeholder="Paste full Khata text here..."></textarea>

<br>
<button class="process" onclick="processKhata()">Process</button>
<button class="export" onclick="exportExcel()">Export Relational Excel</button>
<button class="clear" onclick="clearAll()">Clear</button>

<div class="count">
Total Owners: <span id="ownerCount">0</span> |
Total Khasra: <span id="khasraCount">0</span>
</div>

<table id="previewTable">
<thead>
<tr>
<th>Khasra</th>
<th>Area</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

/* Global relational storage */
let currentVillage="";
let currentTehsil="";
let currentDistrict="";
let currentKhata="";
let currentOwners=[];
let currentKhasra=[];

function getValue(text, regex){
  const match=text.match(regex);
  return match?match[1].trim():"";
}

  const text=document.getElementById("inputText").value;

  document.querySelector("#previewTable tbody").innerHTML="";
  currentOwners=[];
  currentKhasra=[];
