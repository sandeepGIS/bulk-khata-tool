<script>

let currentVillage="";
let currentTehsil="";
let currentDistrict="";
let currentKhata="";
let currentOwners=[];
let currentKhasra=[];

function getValue(text, regex){
  const match=text.match(regex);
  return match?match[1].trim():"";
}

function processKhata(){

  const text=document.getElementById("inputText").value;

  if(!text){
    alert("Please paste Khata text first.");
    return;
  }

  document.querySelector("#previewTable tbody").innerHTML="";
  currentOwners=[];
  currentKhasra=[];

  currentVillage=getValue(text,/ग्राम\s*का\s*नाम\s*:\s*([^\n]+)/);
  currentTehsil=getValue(text,/तहसील\s*:\s*([^\n]+)/);
  currentDistrict=getValue(text,/जनपद\s*:\s*([^\n]+)/);
  currentKhata=getValue(text,/खाता\s*संख्या\s*:\s*(\d+)/);

  /* ✅ OWNER EXTRACTION (stable version) */
  const ownerLines=text.split("\n");

  ownerLines.forEach(line=>{
    if(line.includes("/") && !line.includes("खसरा") && !line.includes("क्षेत्रफल")){
      
      let parts=line.split("/");
      if(parts.length>=2){
        let owner=parts[0].trim();
        let father=parts[1].replace(/[0-9].*/,"").trim();

        if(owner.length>2){
          currentOwners.push({
            owner:owner,
            father:father
          });
        }
      }
    }
  });

  /* ✅ KHASRA EXTRACTION */
  const allNumbers=[...text.matchAll(/\b\d{3,5}\b/g)].map(m=>m[0]);
  const areaList=[...text.matchAll(/\b0\.\d{3,4}\b/g)].map(m=>m[0]);

  /* Remove fasli years */
  const khasraList=allNumbers.filter(n=>n.length>=3 && !n.startsWith("14"));

  const finalLength=Math.min(khasraList.length,areaList.length);

  for(let i=0;i<finalLength;i++){

    currentKhasra.push({
      number:khasraList[i],
      area:areaList[i]
    });

    let row=document.createElement("tr");
    row.innerHTML=`
      <td>${khasraList[i]}</td>
      <td>${areaList[i]}</td>
    `;
    document.querySelector("#previewTable tbody").appendChild(row);
  }

  document.getElementById("ownerCount").innerText=currentOwners.length;
  document.getElementById("khasraCount").innerText=currentKhasra.length;
}


/* ✅ RELATIONAL EXPORT */
function exportExcel(){

  if(currentKhasra.length===0){
    alert("Please process khata first.");
    return;
  }

  const workbook=XLSX.utils.book_new();

  const khataData=[{
    Khata_No:currentKhata,
    Village:currentVillage,
    Tehsil:currentTehsil,
    District:currentDistrict
  }];
  XLSX.utils.book_append_sheet(workbook,
    XLSX.utils.json_to_sheet(khataData),
    "KHATA"
  );

  const ownerData=currentOwners.map((o,i)=>({
    Owner_ID:i+1,
    Khata_No:currentKhata,
    Owner_Name:o.owner,
    Father_Name:o.father
  }));
  XLSX.utils.book_append_sheet(workbook,
    XLSX.utils.json_to_sheet(ownerData),
    "OWNERS"
  );

  const khasraData=currentKhasra.map((k,i)=>({
    Khasra_ID:i+1,
    Khata_No:currentKhata,
    Khasra_No:k.number,
    Area:k.area
  }));
  XLSX.utils.book_append_sheet(workbook,
    XLSX.utils.json_to_sheet(khasraData),
    "KHASRA"
  );

  XLSX.writeFile(workbook,"Khata_Relational_GIS_Format.xlsx");
}

function clearAll(){
  document.getElementById("inputText").value="";
  document.querySelector("#previewTable tbody").innerHTML="";
  document.getElementById("ownerCount").innerText="0";
  document.getElementById("khasraCount").innerText="0";
  currentOwners=[];
  currentKhasra=[];
}

</script>
